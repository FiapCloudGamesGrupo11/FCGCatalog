apiVersion: apps/v1
kind: Deployment
metadata:
  name: db

spec:
  replicas: 1

  selector:
    matchLabels:
      app: db
  
  template:
    metadata:
      labels:
        app: db
  
    spec:
      containers:
      - name: db
        image: mcr.microsoft.com/mssql/server:2022-latest
        imagePullPolicy: IfNotPresent

        env:
        - name: SA_PASSWORD
          value: "Your_strong!Passw0rd"
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_PID
          value: "Developer"

        ports:
        - containerPort: 1433

        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "4Gi"